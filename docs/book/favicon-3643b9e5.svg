<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    OpenCrabs favicon — brand mark only (crab on transparent bg).
    Emoji glyph: zero path data, renders identically on every OS, never
    mis-colours in dark/light tabs. The crab IS the brand.

    Why not the full 🦀 on transparent:
      - 32×32 emoji gets muddy; the orange rounded square reads as a
        solid brand tile even at 16×16.
      - Transparent favicons disappear on white tab strips; the tile
        guarantees contrast.
  -->
  <rect width="512" height="512" rx="96" fill="#f97316"/>
  <text x="256" y="256" font-size="320" text-anchor="middle" dominant-baseline="central">🦀</text>
</svg>
